[project]
name = "api"
version = "0.1.0"
authors = [{ name = "ethan-wickstrom", email = "e.t.wickstrom@wustl.edu" }]
requires-python = ">=3.13"
dependencies = ["ai", "core", "fastapi[standard]>=0.135.1"]

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
core = { workspace = true }
ai = { workspace = true }

[tool.fastapi]
entrypoint = "api.app:app"
